
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reservation Page</title>

  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

<!-- ================= HEADER TOP ================= -->
<div class="bg-dark text-light py-2">
  <div class="container d-flex justify-content-between">
    <div>
      Email: info@restaurant.com | Phone: +880123456789
    </div>
    <div>
      <a href="/reservation.html" class="text-light me-3">Reservation</a>
      <a href="/login.html" class="text-light me-3">Login</a>
      <a href="/signup.html" class="text-light">Register</a>
    </div>
  </div>
</div>

<!-- ================= NAVBAR ================= -->
<nav class="navbar navbar-expand-lg navbar-light bg-light">
  <div class="container">
    <a class="navbar-brand fw-bold" href="#">Foodies</a>
    <button class="navbar-toggler" data-bs-toggle="collapse" data-bs-target="#nav">
      <span class="navbar-toggler-icon"></span>
    </button>

    <div class="collapse navbar-collapse" id="nav">
      <ul class="navbar-nav ms-auto">
        <li class="nav-item"><a class="nav-link" href="/index.html">Home</a></li>
        <li class="nav-item"><a class="nav-link" href="/menu.html">Menu</a></li>
        <li class="nav-item"><a class="nav-link" href="/reservation.html">Reservation</a></li>
        <li class="nav-item"><a class="nav-link" href="/about.html">About</a></li>
        <li class="nav-item"><a class="nav-link" href="/contact.html">Contact</a></li>
        <li class="nav-item"><a class="nav-link" href="/login.html">Login/Register</a></li>
      </ul>
    </div>
  </div>
</nav>

<!-- ================= BREADCRUMB ================= -->
<div class="container mt-3">
  <nav>
    <ol class="breadcrumb">
      <li class="breadcrumb-item"><a href="#">Home</a></li>
      <li class="breadcrumb-item active">Reservation</li>
    </ol>
  </nav>
</div>

<!-- ================= FORM ================= -->
<div class="container mt-4">
  <h2 class="text-center mb-4">Book a Table</h2>

  <form id="reservationForm">

    <div class="row">
      <div class="col-md-6 mb-3">
        <label>Name</label>
        <input type="text" class="form-control" id="name" required>
      </div>

      <div class="col-md-6 mb-3">
        <label>Email</label>
        <input type="email" class="form-control" id="email" required>
      </div>
    </div>

    <div class="row">
      <div class="col-md-6 mb-3">
        <label>Phone</label>
        <input type="text" class="form-control" id="phone" required>
      </div>

      <div class="col-md-6 mb-3">
        <label>Number of Guests</label>
        <input type="number" class="form-control" id="guests" required>
      </div>
    </div>

    <div class="row">
      <div class="col-md-6 mb-3">
        <label>Date</label>
        <input type="date" class="form-control" id="date" required>
      </div>

      <div class="col-md-6 mb-3">
        <label>Time</label>
        <input type="time" class="form-control" id="time" required>
      </div>
    </div>

    <div class="mb-3">
      <label>Special Request</label>
      <textarea class="form-control" id="request"></textarea>
    </div>

    <button type="submit" class="btn btn-primary w-100">Reserve Now</button>
  </form>
</div>

<!-- ================= MODAL ================= -->
<div class="modal fade" id="confirmationModal" tabindex="-1">
  <div class="modal-dialog">
    <div class="modal-content">

      <div class="modal-header">
        <h5 class="modal-title">Reservation Confirmed</h5>
        <button class="btn-close" data-bs-dismiss="modal"></button>
      </div>

      <div class="modal-body">
        <p id="summary"></p>
      </div>

      <div class="modal-footer">
        <button class="btn btn-success" data-bs-dismiss="modal">OK</button>
      </div>

    </div>
  </div>
</div>

<!-- ================= JS ================= -->
<script>
  const form = document.getElementById("reservationForm");

  form.addEventListener("submit", function(e) {
    e.preventDefault();

    // Get values
    const name = document.getElementById("name").value;
    const email = document.getElementById("email").value;
    const phone = document.getElementById("phone").value;
    const guests = document.getElementById("guests").value;
    const date = document.getElementById("date").value;
    const time = document.getElementById("time").value;
    const request = document.getElementById("request").value;

    // Create summary
    const summaryText = `
      <strong>Name:</strong> ${name} <br>
      <strong>Email:</strong> ${email} <br>
      <strong>Phone:</strong> ${phone} <br>
      <strong>Guests:</strong> ${guests} <br>
      <strong>Date:</strong> ${date} <br>
      <strong>Time:</strong> ${time} <br>
      <strong>Request:</strong> ${request || 'None'} <br><br>
      <span class="text-success">Your table is booked successfully!</span>
    `;

    document.getElementById("summary").innerHTML = summaryText;

    // Show modal
    const modal = new bootstrap.Modal(document.getElementById("confirmationModal"));
    modal.show();

    // Reset form
    form.reset();
  });
</script>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
